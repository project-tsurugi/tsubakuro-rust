version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10"

  commands:
    - |
      set -e

      wget -q https://github.com/protocolbuffers/protobuf/releases/download/v3.12.4/protoc-3.12.4-linux-x86_64.zip
      unzip -q protoc-3.12.4-linux-x86_64.zip -d $HOME/protoc
      export PATH="$HOME/protoc/bin:$PATH"
      export PROTOC="$HOME/protoc/bin/protoc"

      curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      export PATH="$HOME/.cargo/bin:$PATH"

      pip install uv

      # Local command examples:
      # cd /path/to/tsubakuro-rust-python
      # rm -rf docs/api && mkdir -p docs/api
      # uv run pdoc tsurugi_dbapi --html -o docs/api --force
      # mv docs/api/tsurugi_dbapi/* docs/api/ && rmdir docs/api/tsurugi_dbapi
      # uv run mkdocs serve -f docs/mkdocs.yml
      # browse: http://127.0.0.1:8000/

      cd tsubakuro-rust-python
      rm -rf docs/api && mkdir -p docs/api
      uv run pdoc tsurugi_dbapi --html -o docs/api --force
      mv docs/api/tsurugi_dbapi/* docs/api/ || true
      rmdir docs/api/tsurugi_dbapi || true

      uv run mkdocs build \
        -f docs/mkdocs.yml \
        --site-dir "$READTHEDOCS_OUTPUT/html" \
        --clean
